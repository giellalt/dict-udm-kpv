remote_theme: giellalt/jekyll-theme-giellalt@main
title: Dictionary for Udmurt ⇒ Komi Zyryan
description: An electronic dictionary from Udmurt to Komi Zyryan
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-github-metadata
  - jekyll-include-cache
  - jemoji

defaults:
  - scope: { path: "" }
    values:
      layout: default

markdown: kramdown
kramdown:
  syntax_highlighter_opts:
    disable: true
